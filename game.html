<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>背包小游戏 Demo</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #182331;
      }

      #boot-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #182331;
        z-index: 10;
      }

      #boot-loading::before {
        content: "";
        position: absolute;
        width: min(100vw, 50vh);
        height: min(100vh, 200vw);
        background:
          radial-gradient(circle at 16% 10%, rgba(255, 255, 255, 0.08) 0 9%, transparent 10%),
          radial-gradient(circle at 45% 36%, rgba(255, 255, 255, 0.07) 0 14%, transparent 15%),
          radial-gradient(circle at 78% 63%, rgba(255, 255, 255, 0.06) 0 13%, transparent 14%),
          linear-gradient(180deg, #55b971 0%, #3a935d 100%);
      }

      .boot-progress {
        position: relative;
        width: min(70vw, 360px);
        height: 18px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(21, 28, 33, 0.92);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
      }

      .boot-progress span {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #48f0ca, #f9df5d);
        animation: boot-progress 1.25s ease-in-out infinite alternate;
      }

      @keyframes boot-progress {
        from { width: 28%; }
        to { width: 82%; }
      }
    </style>
  </head>
  <body>
    <div id="boot-loading"><div class="boot-progress"><span></span></div></div>
    <div id="game-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
